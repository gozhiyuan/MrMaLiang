name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check out the compatible MalaClaw runtime
        uses: actions/checkout@v4
        with:
          repository: gozhiyuan/MalaClaw
          # v1.0.2 — must satisfy runtime-compatibility.json (">=1.0.2 <2.0.0").
          # The prior pin (29abaf5c) was v1.0.0, below the supported minimum.
          ref: 2b71703fc70f48ce8efb5872e4a536b57a05cc14
          path: .dependencies/MalaClaw
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Build MalaClaw runtime
        run: |
          npm ci --prefix .dependencies/MalaClaw
          npm run build --prefix .dependencies/MalaClaw
      - run: npm ci
      - run: npm run build
      - name: Test MrMaLiang with its pinned MalaClaw runtime
        run: npm test
        env:
          MALACLAW_SOURCE_DIR: ${{ github.workspace }}/.dependencies/MalaClaw
      - run: npm run maliang -- template list
