version: 1
project: { id: nanogpt-ablation, name: nanoGPT Controlled Ablation }
profile: existing_code
hypothesis: A predeclared training modification improves held-out validation loss against the pinned nanoGPT baseline.
inputs:
  code:
    - { id: nanogpt, source: https://github.com/karpathy/nanoGPT, revision: 3adf61e154c3fe3fca428ad6bc3818b27a3b8291, license: MIT }
  benchmarks:
    - { id: shakespeare, source: https://github.com/karpathy/char-rnn, revision: 6f9487a6fe5b420b7ca9afb0d7c078e37c1d1b4e, license: MIT }
evaluation: { primary_metric: validation_loss, direction: minimize, baseline_id: pinned-baseline, control: fixed tokenizer, data split, and training budget, seeds: [11, 23, 47], statistical_test: paired bootstrap confidence interval, heldout_split: validation }
suite:
  id: nanogpt-controlled-ablation
  max_rounds: 3
  studies:
    - { id: baseline, kind: training_ablation, conditions: [pinned-baseline], acceptance_criteria: [reproduce pinned baseline] }
    - { id: candidate, kind: training_ablation, depends_on: [baseline], conditions: [candidate], acceptance_criteria: [test approved worktree revision against baseline] }
    - { id: replication, kind: training_ablation, depends_on: [candidate], optional_action: replicate_condition, acceptance_criteria: [repeat promising candidate across all seeds] }
    - { id: horizon, kind: horizon_extension, depends_on: [candidate], optional_action: extend_horizon, acceptance_criteria: [evaluate longer training horizon] }
runner: { kind: command, command: python3 templates/runners/nanogpt.py }
execution: { max_trials: 18, max_active_run_minutes: 1440, max_parallel_trials: 2, requires_design_approval: true, requires_revision_approval: true }
