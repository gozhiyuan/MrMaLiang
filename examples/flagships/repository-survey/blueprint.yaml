version: 1
id: repository-survey
template: paper.survey
components: [writing]
topic: System architecture and research workflow design
base_mode: packages/longwrite/configs/modes/auto_research_agentic.yaml
required_inputs:
  - pinned GitHub URL or local Git repository
init_passthrough:
  output_formats: [markdown, pdf]
  citation_style: author_year
init_args:
  - --citation-style
  - author_year
  - --output-format
  - markdown
  - pdf
required_setup:
  - Node.js 22 or newer
  - MalaClaw and an authenticated Codex or Claude runtime
  - Git access to the pinned repository
expected_artifacts:
  - writing/codebases/manifest.json
  - writing/evidence/codebase-analysis.json
  - writing/reports/codebase-analysis-repair.md
  - writing/paper/main.pdf
  - writing/reports/run-provenance.json
