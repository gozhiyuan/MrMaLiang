version: 1
project:
  id: nanogpt-agentic-empirical
  name: nanoGPT Agentic Empirical Paper
  mode: computational_experiment
profile: existing_code
authoring:
  mode: agentic
  base_input_id: repo-nanogpt
  language: python
  entrypoint: maliang_runner.py
  max_revision_rounds: 3
  max_files: 30
  max_file_bytes: 80000
  require_tests: true
  require_literature_context: true
hypothesis: Within a fixed nanoGPT training and evaluation budget, a literature-grounded agent-authored intervention can be evaluated reproducibly against the pinned baseline.
research_question: Which bounded nanoGPT intervention is best justified by prior work and survives controlled multi-seed evaluation?
inputs:
  code:
    - id: repo-nanogpt
      source: https://github.com/karpathy/nanoGPT.git
      revision: 3adf61e154c3fe3fca428ad6bc3818b27a3b8291
      materialize: git
  benchmarks:
    - id: shakespeare
      source: https://github.com/karpathy/char-rnn
      revision: 6f9487a6fe5b420b7ca9afb0d7c078e37c1d1b4e
      license: MIT
      materialize: git
  models: []
evaluation:
  primary_metric: validation_loss
  direction: minimize
  baseline_id: pinned-baseline
  control: fixed tokenizer, Shakespeare character split, training iterations, parameter budget, evaluator, and hardware class
  seeds: [11, 23, 47]
  statistical_test: paired bootstrap confidence interval
  heldout_split: validation
suite:
  id: nanogpt-agentic-study
  max_rounds: 3
  studies:
    - id: primary
      kind: training_ablation
      depends_on: []
      acceptance_criteria:
        - execute baseline and agent candidate under identical controls for every seed
        - report validation loss and a paired confidence interval without selecting seeds post hoc
      conditions: [pinned-baseline, agent-candidate]
runner:
  kind: command
execution:
  max_trials: 8
  max_active_run_minutes: 1440
  max_recorded_tokens: 2000000
  max_parallel_trials: 1
  requires_design_approval: true
  requires_revision_approval: true
  candidate_worktrees: []
  enabled_optional_actions: []
outputs:
  longwrite_workspace: ../writing
